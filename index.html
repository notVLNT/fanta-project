<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanta Women ⚽</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- AUTH -->
    <div id="auth-container">
        <div id="login-form">
            <h2>Fanta Women ⚽</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Accedi</button>
            <button onclick="registrazione()">Registrati</button>
        </div>

        <div id="user-logged" style="display:none;">
            <span id="user-email"></span>
            <button onclick="logout()">Esci</button>
        </div>
    </div>

    <!-- CONTENUTO PRINCIPALE -->
    <div class="container">
        <header>
            <h1>Fanta Women ⚽</h1>
            <div id="display-budget" class="budget-badge">Budget: 500 💰</div>
        </header>

        <!-- SELEZIONE MODULO -->
        <div class="modulo-wrap">
            <label for="select-modulo">Modulo:</label>
            <select id="select-modulo" onchange="cambiaModulo(this.value)">
                <option value="4-3-3">4-3-3</option>
                <option value="4-4-2">4-4-2</option>
                <option value="3-5-2">3-5-2</option>
                <option value="3-4-3">3-4-3</option>
                <option value="5-3-2">5-3-2</option>
            </select>
        </div>

        <!-- CAMPO -->
        <div class="pitch-container">
            <div id="campo"></div>
        </div>

        <!-- PANCHINA -->
        <div id="panchina" class="panchina-container"></div>

        <!-- MERCATO -->
        <section id="mercato-section">
            <div id="lista-calciatrici" class="lista-container">
                <p class="hint">Clicca su un ruolo nel campo per cercare le giocatrici</p>
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>

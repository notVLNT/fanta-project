<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanta Serie A Women - Il Mio Team</title>
    
    <!-- 1. Libreria Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 2. Il tuo CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container">
    <div id="login-form">
        <h3>Entra nel Fanta Women</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Accedi</button>
        <button onclick="registrazione()">Registrati</button>
    </div>
    
    <div id="user-logged" style="display: none;">
        <span id="user-email"></span>
        <button onclick="logout()">Esci</button>
    </div>
</div>

    <div class="container">
        <header>
            <h1>Fanta Women ⚽</h1>
            <div id="display-budget" class="budget-badge">Budget: 250 💰</div>
        </header>

        <!-- IL CAMPO DA CALCIO -->
        <div class="pitch-container">
            <div class="pitch">
                
                <!-- ATTACCO -->
                <div class="field-row">
                    <div class="slot" id="a-1" onclick="apriMercato('A', 'a-1')">+</div>
                    <div class="slot" id="a-2" onclick="apriMercato('A', 'a-2')">+</div>
                    <div class="slot" id="a-3" onclick="apriMercato('A', 'a-3')">+</div>
                </div>

                <!-- CENTROCAMPO -->
                <div class="field-row">
                    <div class="slot" id="c-1" onclick="apriMercato('C', 'c-1')">+</div>
                    <div class="slot" id="c-2" onclick="apriMercato('C', 'c-2')">+</div>
                    <div class="slot" id="c-3" onclick="apriMercato('C', 'c-3')">+</div>
                </div>

                <!-- DIFESA -->
                <div class="field-row">
                    <div class="slot" id="d-1" onclick="apriMercato('D', 'd-1')">+</div>
                    <div class="slot" id="d-2" onclick="apriMercato('D', 'd-2')">+</div>
                    <div class="slot" id="d-3" onclick="apriMercato('D', 'd-3')">+</div>
                    <div class="slot" id="d-4" onclick="apriMercato('D', 'd-4')">+</div>
                </div>

                <!-- PORTIERE -->
                <div class="field-row">
                    <div class="slot" id="p-1" onclick="apriMercato('P', 'p-1')">+</div>
                </div>

            </div>
        </div>

        <!-- ZONA MERCATO (Apparirà qui la lista quando clicchi sui +) -->
        <section id="mercato-section">
            <div id="lista-calciatrici" class="lista-container">
                <p class="hint">Clicca su un ruolo nel campo per cercare le giocatrici</p>
            </div>
        </section>

    </div>

    <!-- 3. Il tuo JavaScript (Sempre alla fine) -->
    <script src="app.js"></script>
</body>
</html>
